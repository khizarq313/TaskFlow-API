# Production Configuration for TaskFlow API
# All sensitive values should be provided via environment variables

# Server Configuration
server.port=${PORT:8080}

# Application
spring.application.name=TaskFlow API

# Database Configuration (PostgreSQL)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Firebase Configuration
# Use one of these methods (in order of precedence):
# 1. Base64-encoded JSON (recommended): FIREBASE_SERVICE_ACCOUNT_JSON
# 2. File path: FIREBASE_SERVICE_ACCOUNT_PATH
# 3. Raw JSON string: FIREBASE_SERVICE_ACCOUNT_JSON_RAW
firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON:}
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}
firebase.service-account-json-raw=${FIREBASE_SERVICE_ACCOUNT_JSON_RAW:}

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://yourdomain.com}

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Logging
logging.level.root=INFO
logging.level.com.taskflow.api=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Logging Pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Log File (optional)
logging.file.name=${LOG_FILE_PATH:logs/taskflow-api.log}
logging.file.max-size=10MB
logging.file.max-history=30

# Actuator (if enabled)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
