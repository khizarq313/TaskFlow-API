server:
  port: ${PORT:8080}

spring:
  application:
    name: TaskFlow API
  
  # Database Configuration
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/taskflow}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  
  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Firebase configuration
firebase:
  service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}
  service-account-json-raw: ${FIREBASE_SERVICE_ACCOUNT_JSON_RAW:}

# CORS
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# OpenAPI / Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# Logging
logging:
  level:
    com.taskflow.api: ${LOG_LEVEL:INFO}
    org.springframework.security: INFO
    org.hibernate.SQL: WARN

